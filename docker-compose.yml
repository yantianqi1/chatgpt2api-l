services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api-l:latest
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}
      CHATGPT2API_PUBLIC_BASE_URL: ${CHATGPT2API_PUBLIC_BASE_URL:-}
      CHATGPT2API_WEB_VARIANT: ${CHATGPT2API_WEB_VARIANT:-}
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
